name: Build Windows EXE and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      APP_ENTRYPOINT: main.py
      APP_NAME: ulstu-reception-convertor
      CONFIG_FILE: direction_short_names.ini

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Validate release config file
        shell: pwsh
        run: |
          if (!(Test-Path $env:CONFIG_FILE)) {
            throw "Required config file was not found: $env:CONFIG_FILE"
          }

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --onefile `
            --name $env:APP_NAME `
            --add-data "$env:CONFIG_FILE;." `
            $env:APP_ENTRYPOINT

      - name: Validate EXE
        shell: pwsh
        run: |
          $exePath = ".\dist\$env:APP_NAME.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected executable was not found: $exePath"
          }
          & $exePath --help

      - name: Prepare release assets
        shell: pwsh
        run: |
          $releaseDir = ".\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Copy-Item ".\dist\$env:APP_NAME.exe" "$releaseDir\$env:APP_NAME.exe" -Force
          Copy-Item ".\$env:CONFIG_FILE" "$releaseDir\$env:CONFIG_FILE" -Force

          Compress-Archive `
            -Path "$releaseDir\$env:APP_NAME.exe", "$releaseDir\$env:CONFIG_FILE" `
            -DestinationPath "$releaseDir\$env:APP_NAME-windows.zip" `
            -Force

          Get-ChildItem $releaseDir

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: |
            release/${{ env.APP_NAME }}.exe
            release/${{ env.CONFIG_FILE }}
            release/${{ env.APP_NAME }}-windows.zip

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @(
            ".\release\$env:APP_NAME.exe",
            ".\release\$env:CONFIG_FILE",
            ".\release\$env:APP_NAME-windows.zip"
          )

          if (gh release view $tag 2>$null) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets `
              --title $tag `
              --notes "Автоматическая сборка Windows EXE. Скачайте ZIP, чтобы exe и файл direction_short_names.ini лежали рядом."
          }
