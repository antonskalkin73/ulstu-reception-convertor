name: Build Windows EXE and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      APP_ENTRYPOINT: main.py
      APP_NAME: ulstu-reception-convertor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } else {
            Write-Host "requirements.txt not found, skipping project dependency installation."
          }
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --name $env:APP_NAME $env:APP_ENTRYPOINT

      - name: Validate EXE
        shell: pwsh
        run: |
          $exePath = ".\dist\$env:APP_NAME.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected executable was not found: $exePath"
          }
          & $exePath --help

      - name: Create GitHub Release and upload EXE
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            .\dist\$env:APP_NAME.exe `
            --title $env:GITHUB_REF_NAME `
            --notes "Автоматическая сборка Windows EXE"
